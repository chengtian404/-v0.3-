{% extends "base.html" %}

{% block head %}
<style>
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; background:#101820; color:#e8f0f3; font-family:"Microsoft YaHei","PingFang SC",sans-serif; }
    .login-stage { width:min(920px,calc(100% - 32px)); display:grid; grid-template-columns:1.2fr .8fr; border:1px solid #2a3942; border-radius:8px; overflow:hidden; background:#151f26; box-shadow:0 24px 70px rgba(0,0,0,.32); }
    .login-context { padding:46px; background:#0d151a; position:relative; min-height:470px; display:flex; flex-direction:column; justify-content:space-between; }
    .login-context::after { content:""; position:absolute; right:36px; bottom:38px; width:150px; height:150px; border:1px solid rgba(45,212,191,.28); border-radius:50%; }
    .brand { color:#5eead4; font-size:15px; font-weight:750; }
    .context-copy { position:relative; z-index:1; }
    .context-copy h1 { margin:0 0 12px; font-size:30px; letter-spacing:0; }
    .context-copy p { margin:0; max-width:410px; color:#7f929d; line-height:1.8; font-size:13px; }
    .context-meta { color:#526671; font-size:11px; }
    .login-panel { padding:46px 38px; display:flex; flex-direction:column; justify-content:center; background:#fff; color:#1c2931; }
    .login-panel h2 { margin:0 0 6px; font-size:21px; }.login-panel .subtitle { color:#85929b; font-size:12px; margin-bottom:24px; }
    .field { margin-bottom:15px; }.field label { display:block; margin-bottom:6px; color:#65737d; font-size:12px; }.field input { width:100%; height:42px; border:1px solid #d8dfe3; border-radius:5px; padding:0 12px; outline:none; }.field input:focus { border-color:#0d9488; box-shadow:0 0 0 2px rgba(13,148,136,.08); }
    .login-submit { width:100%; height:42px; border:0; border-radius:5px; background:#087f8c; color:#fff; font-weight:700; cursor:pointer; margin-top:4px; }.login-submit:hover { background:#076c77; }
    .login-error { padding:9px 11px; margin-bottom:14px; border:1px solid #fecaca; background:#fff1f2; color:#b91c1c; border-radius:5px; font-size:12px; }
    .return-link { margin-top:18px; color:#81909a; text-align:center; font-size:12px; }.return-link a { color:#087f8c; }
    @media(max-width:720px){.login-stage{grid-template-columns:1fr}.login-context{display:none}.login-panel{padding:36px 25px;min-height:450px}}
</style>
{% end %}

{% block body %}
<main class="login-stage">
    <section class="login-context"><div class="brand">DataFinderAgentOS</div><div class="context-copy"><h1>后台管理系统</h1><p>统一管理系统权限、数据瞭望、采集规则、数据仓库与 OpenAI-compatible 模型服务。</p></div><div class="context-meta">ADMIN OPERATIONS CONSOLE · v0.1</div></section>
    <section class="login-panel"><h2>管理员登录</h2><div class="subtitle">请输入系统管理员账号继续</div>{% if error %}<div class="login-error">{{ error }}</div>{% end %}<form method="post" action="/admin/login">{% module xsrf_form_html() %}<div class="field"><label>账号</label><input name="username" autocomplete="username" required autofocus></div><div class="field"><label>密码</label><input type="password" name="password" autocomplete="current-password" required></div><button class="login-submit" type="submit">登录后台</button></form><div class="return-link"><a href="/">返回用户侧</a></div></section>
</main>
{% end %}
